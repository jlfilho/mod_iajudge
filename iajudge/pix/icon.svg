<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">IA Judge icon</title>
  <desc id="desc">Icon for an AI-assisted code judging Moodle activity, with code window, AI circuit brain and approval shield.</desc>

  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="0.45" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <linearGradient id="panel" x1="88" y1="142" x2="328" y2="344" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162D6B"/>
      <stop offset="1" stop-color="#061338"/>
    </linearGradient>

    <linearGradient id="cyanPurple" x1="115" y1="155" x2="375" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="0.55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="shieldFill" x1="305" y1="258" x2="432" y2="427" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.28"/>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <rect width="512" height="512" rx="96" fill="url(#bg)"/>
    <circle cx="94" cy="72" r="156" fill="#38BDF8" opacity="0.15"/>
    <circle cx="420" cy="410" r="180" fill="#9333EA" opacity="0.2"/>

    <!-- AI circuit / brain motif -->
    <g opacity="0.95" filter="url(#glow)">
      <path d="M294 142
               C294 115 316 94 344 96
               C359 75 394 77 408 101
               C439 102 462 126 460 157
               C482 170 491 203 474 227
               C488 256 466 289 434 287
               C426 315 397 331 370 319
               C349 338 315 331 302 306
               C277 301 260 278 264 253
               C244 239 240 210 257 192
               C255 168 270 148 294 142Z"
            stroke="url(#cyanPurple)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.72"/>

      <path d="M356 100 V164 L332 188 V259" stroke="#67E8F9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M404 105 V157 L383 178 V228" stroke="#A5B4FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M452 157 H424 L399 183" stroke="#C084FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M450 223 H410 L382 251" stroke="#A78BFA" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M321 138 V205 L296 230" stroke="#22D3EE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="356" cy="100" r="11" fill="#67E8F9"/>
      <circle cx="404" cy="105" r="11" fill="#93C5FD"/>
      <circle cx="452" cy="157" r="11" fill="#C4B5FD"/>
      <circle cx="450" cy="223" r="11" fill="#C084FC"/>
      <circle cx="321" cy="138" r="11" fill="#67E8F9"/>
      <circle cx="382" cy="251" r="11" fill="#A78BFA"/>
    </g>

    <!-- Code editor panel -->
    <g filter="url(#softShadow)">
      <rect x="72" y="158" width="278" height="246" rx="28" fill="url(#panel)" stroke="#60A5FA" stroke-opacity="0.42" stroke-width="3"/>
      <path d="M72 208H350" stroke="#60A5FA" stroke-opacity="0.25" stroke-width="3"/>
      <circle cx="106" cy="184" r="10" fill="#67E8F9"/>
      <circle cx="137" cy="184" r="10" fill="#A855F7"/>
      <circle cx="168" cy="184" r="10" fill="#D946EF"/>

      <path d="M153 258L120 290L153 322" stroke="#67E8F9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M248 258L281 290L248 322" stroke="#67E8F9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M213 244L190 337" stroke="#67E8F9" stroke-width="18" stroke-linecap="round"/>

      <path d="M108 350H260" stroke="#818CF8" stroke-width="10" stroke-linecap="round"/>
      <path d="M108 374H208" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
      <path d="M108 398H232" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round"/>
      <path d="M254 398H290" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- Judging shield -->
    <g filter="url(#softShadow)">
      <path d="M356 244
               C385 266 413 277 445 282
               V339
               C445 390 413 428 356 449
               C299 428 267 390 267 339
               V282
               C299 277 327 266 356 244Z"
            fill="white" opacity="0.96"/>
      <path d="M356 265
               C380 282 402 291 427 296
               V339
               C427 378 403 407 356 426
               C309 407 285 378 285 339
               V296
               C310 291 332 282 356 265Z"
            fill="url(#shieldFill)"/>
      <path d="M319 350L345 376L397 323"
            stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
